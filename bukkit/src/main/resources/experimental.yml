ExperimentalVersion: "1.0"

# Thanks for using LoginTo experimental features!
# In this file, you will find all features currently under development.
# Please note that these features may be unstable; we recommend testing them on a development server first.
# If you encounter any bugs, please report them at https://github.com/Yager400/LoginTo/issues or on Discord.
# Once a feature becomes stable, it will be moved to the config.yml file (and its messages to messages.yml).




# Premium Feature
# DISCLAIMER: This configuration section is subject to change and will be reworked in the future.
 # This feature requires your server to be set to offline-mode.
 # This means that skins and capes will not be visible by default, and players' progress
 # (inventory, position, XP, etc.) will be linked to their offline UUID instead of their online one.
premium:

  # Enables premium authentication on the bukkit server side.
  # If you enable this, ensure that proxy-level premium authentication is disabled in your config.yml.
  # Note: Premium players will not have their skins and capes displayed. To fix this, please install SkinRestorer.
  # This feature generally only requires PacketEvents (which comes bundled with LoginTo).
  # However, if you want to support Bedrock Edition players, you MUST install Floodgate; otherwise, most Bedrock players will experience authentication errors.
  # Note: This feature WILL NOT work behind a proxy. Ensure this is a standalone bukkit server.
  bukkit-premium-auth: false

  # The duration of the name cache (in hours).
  # After X hours, the player's record will expire and the plugin will remove it.
  cache-duration: 24

  # Messages sent to players regarding this feature
  # Every message will be moved to the message.yml file
  player-messages:

    # Sent when a player joins with a premium username but 'skipped' the plugin's premium authentication process.
    # WARNING: This message does NOT support MiniMessage or PlaceholderAPI. It will be displayed in red by default as it indicates an error.
    on-authentication-skip: "You do not have an authenticated profile right now. Please contact the staff or try restarting your launcher."





# Message language translation
# This feature for now doesn't do anything, but in the future, this will be used for automatically download/safe
 # messages file that are automatically translated into your language
message-language:

  # Message languages that you want to download/save
  language: ""

  # Note: I don't know if I will make the plugin download the file from github or already bundle them in the file.
   # If you want to suggest an improvement or help with the translation, go here: https://github.com/Yager400/LoginTo and
   # an issue or PR